version: '3.8'

services:
  ivetmart-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ivetmart-web
    restart: always
    ports:
      - "8095:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ivetmart-network

networks:
  ivetmart-network:
    driver: bridge
